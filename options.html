<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="options.css">
  <title>Woffle — Settings</title>
</head>
<body>
  <!-- CRT scanline overlay -->
  <div class="crt-overlay"></div>

  <div class="options-container">

    <!-- Header -->
    <header class="options-header">
      <div class="header-mascot">🧇</div>
      <div>
        <h1 class="options-title">WOFFLE</h1>
        <p class="options-subtitle">SETTINGS</p>
      </div>
    </header>

    <!-- ============ AUTH SECTION — shown when NOT logged in ============ -->
    <section class="options-section" id="auth-section">
      <p class="section-title green-text">🧇 SIGN IN TO START ZAPPING</p>
      <div class="welcome-steps">
        <p>Create a free account to get 10 video scans per month. Upgrade anytime for more.</p>
      </div>
      <div class="terminal-box">
        <span class="terminal-prompt">@</span>
        <input type="email" id="auth-email" class="terminal-input" placeholder="email@example.com" autocomplete="email" spellcheck="false">
      </div>
      <div class="terminal-box">
        <span class="terminal-prompt">*</span>
        <input type="password" id="auth-password" class="terminal-input" placeholder="password" autocomplete="current-password">
      </div>
      <div class="button-row">
        <button id="btn-login" class="btn-gold">SIGN IN</button>
        <button id="btn-signup" class="btn-dim-wide">SIGN UP</button>
      </div>
      <div id="auth-status" class="status-message"></div>
    </section>

    <!-- ============ ACCOUNT SECTION — shown when logged in ============ -->
    <section class="options-section" id="account-section" style="display:none">
      <p class="section-title">ACCOUNT</p>
      <div class="account-info">
        <div class="account-row">
          <span class="account-label">EMAIL</span>
          <span class="account-value" id="account-email">--</span>
        </div>
        <div class="account-row">
          <span class="account-label">TIER</span>
          <span class="account-value" id="account-tier">FREE</span>
        </div>
        <div class="account-row">
          <span class="account-label">CREDITS</span>
          <span class="account-value" id="account-credits">-- / --</span>
        </div>
        <div class="account-row">
          <span class="account-label">RESETS</span>
          <span class="account-value" id="account-reset">--</span>
        </div>
      </div>
      <div class="button-row">
        <button id="btn-manage-subscription" class="btn-gold">MANAGE SUBSCRIPTION</button>
        <button id="btn-logout" class="btn-dim-wide">LOG OUT</button>
      </div>
    </section>

    <!-- Cache Section -->
    <section class="options-section">
      <label class="section-title">CACHE DATA</label>
      <p class="section-hint">Clear locally cached video analyses</p>
      <button id="btn-clear-cache" class="btn-orange">CLEAR CACHE</button>
      <div id="cache-status" class="status-message"></div>
    </section>

    <!-- About -->
    <footer class="options-footer">
      <p class="version-text">V0.4.0 — SKIP THE FLUFF. GET THE STUFF.</p>
    </footer>

  </div>

  <script src="options.js"></script>
</body>
</html>
