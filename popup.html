<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Waffle Skipper</title>
</head>
<body>
  <div class="crt-overlay"></div>

  <div class="popup-container">
    <header class="popup-header">
      <span class="mascot">WS</span>
      <div class="popup-brand-copy">
        <h1 class="popup-title">WAFFLE SKIPPER</h1>
        <div class="popup-subtitle">RETRO AI VIDEO SKIPPER</div>
      </div>
    </header>

    <section class="popup-section" id="status-section">
      <div class="video-title" id="video-title">NO VIDEO DETECTED</div>
      <div class="analysis-status" id="analysis-status">Navigate to a YouTube video</div>
    </section>

    <section class="popup-section" id="controls-section">
      <div class="section-label">CONTROLS</div>
      <div class="analysis-status ready">AUTO SKIP ALWAYS ON</div>
      <div class="analysis-status">CLICK TIMELINE TO SEEK</div>
      <div class="analysis-status">TAB: NEXT GREEN SECTION</div>
      <div class="analysis-status">SHIFT+TAB: PREV SECTION (ANY)</div>
    </section>

    <section class="popup-section" id="stats-section">
      <div class="section-label">STATS</div>
      <div class="stat-row">
        <span class="stat-label">WAFFLES FOUND</span>
        <span class="stat-value" id="stat-waffle-count">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">TIME SAVEABLE</span>
        <span class="stat-value" id="stat-time-saveable">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">SKIPPED</span>
        <span class="stat-value green" id="stat-skipped">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">TIME SAVED</span>
        <span class="stat-value green" id="stat-time-saved">--</span>
      </div>
    </section>

    <footer class="popup-footer">
      <button class="settings-btn" id="btn-settings" title="Settings">
        SETTINGS
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
