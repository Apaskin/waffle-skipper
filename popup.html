<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Waffle Skipper</title>
</head>
<body>
  <!-- CRT scanline overlay — the subtle horizontal lines that sell the retro feel -->
  <div class="crt-overlay"></div>

  <div class="popup-container">

    <!-- ============ HEADER — branding + tagline ============ -->
    <header class="popup-header">
      <div class="mascot-box">🧇</div>
      <div class="popup-brand">
        <h1 class="popup-title">WOFFLE</h1>
        <div class="popup-tagline">SKIP THE FLUFF. GET THE STUFF.</div>
      </div>
    </header>

    <!-- ============ VIDEO STATUS ============ -->
    <section class="panel" id="status-section">
      <div class="panel-label">NOW PLAYING</div>
      <div class="video-title" id="video-title">NO VIDEO DETECTED</div>
      <div class="analysis-status" id="analysis-status">Navigate to a YouTube video</div>
      <!-- Auto-skip toggle — label left, button right, single compact line -->
      <div class="auto-skip-section">
        <span class="auto-skip-label">AUTO SKIP</span>
        <button id="btn-auto-toggle" class="auto-toggle on">ON ⚡</button>
      </div>
    </section>

    <!-- ============ SCORE PANEL — arcade counter aesthetic ============ -->
    <section class="panel" id="stats-section">
      <div class="panel-label">HIGH SCORE</div>
      <div class="score-grid">
        <div class="score-cell">
          <div class="score-label">WAFFLES FOUND</div>
          <div class="score-value gold" id="stat-waffle-count">--</div>
        </div>
        <div class="score-cell">
          <div class="score-label">TIME SAVEABLE</div>
          <div class="score-value gold" id="stat-time-saveable">--</div>
        </div>
        <div class="score-cell">
          <div class="score-label">WAFFLES ZAPPED</div>
          <div class="score-value green" id="stat-skipped">--</div>
        </div>
        <div class="score-cell">
          <div class="score-label">TIME SAVED ⚡</div>
          <div class="score-value green" id="stat-time-saved">--</div>
        </div>
      </div>
      <!-- Waffle vs substance ratio bar -->
      <div class="ratio-bar-label">
        <span class="ratio-text-green">SUBSTANCE</span>
        <span class="ratio-text-orange">WAFFLE</span>
      </div>
      <div class="ratio-bar" id="ratio-bar">
        <div class="ratio-fill-substance" id="ratio-substance" style="width:100%"></div>
        <div class="ratio-fill-waffle" id="ratio-waffle" style="width:0%"></div>
      </div>
    </section>

    <!-- ============ CREDITS — tier badge + credit counter ============ -->
    <section class="panel" id="credits-section">
      <div class="credits-header">
        <span class="tier-badge" id="tier-badge">FREE</span>
        <span class="credits-text" id="credits-text">-- of -- scans</span>
      </div>
      <div class="credits-bar-track">
        <div class="credits-bar-fill" id="credits-bar-fill" style="width:100%"></div>
      </div>
      <div class="credits-actions">
        <button class="btn-upgrade" id="btn-upgrade">UPGRADE</button>
        <button class="btn-topup" id="btn-topup">BUY CREDITS</button>
      </div>
    </section>

    <!-- ============ FOOTER ============ -->
    <footer class="popup-footer">
      <button class="settings-btn" id="btn-settings" title="Settings">
        ⚙ OPTIONS
      </button>
      <div class="footer-tagline">INSERT COIN TO CONTINUE</div>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
