<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Waffle Skipper</title>
</head>
<body>
  <!-- CRT scanline overlay for retro vibe -->
  <div class="crt-overlay"></div>

  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <span class="mascot">🧇</span>
      <h1 class="popup-title">WAFFLE<br>SKIPPER</h1>
    </header>

    <!-- Video Status -->
    <section class="popup-section" id="status-section">
      <div class="video-title" id="video-title">NO VIDEO DETECTED</div>
      <div class="analysis-status" id="analysis-status">Navigate to a YouTube video</div>
    </section>

    <!-- Mode Selector -->
    <section class="popup-section">
      <div class="section-label">MODE</div>
      <div class="mode-buttons">
        <button class="mode-btn" id="btn-auto" data-mode="AUTO_SKIP">AUTO</button>
        <button class="mode-btn" id="btn-manual" data-mode="MANUAL">MANUAL</button>
        <button class="mode-btn" id="btn-off" data-mode="OFF">OFF</button>
      </div>
    </section>

    <!-- Stats -->
    <section class="popup-section" id="stats-section">
      <div class="section-label">STATS</div>
      <div class="stat-row">
        <span class="stat-label">WAFFLES FOUND</span>
        <span class="stat-value" id="stat-waffle-count">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">TIME SAVEABLE</span>
        <span class="stat-value" id="stat-time-saveable">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">SKIPPED</span>
        <span class="stat-value green" id="stat-skipped">--</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">TIME SAVED</span>
        <span class="stat-value green" id="stat-time-saved">--</span>
      </div>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <button class="settings-btn" id="btn-settings" title="Settings">
        ⚙ SETTINGS
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
